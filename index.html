<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios | GenApps</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#fef2f2', 100: '#fee2e2', 500: '#ef4444', 600: '#dc2626', 700: '#e01f36', 800: '#991b1b', 900: '#7f1d1d' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Custom Scrollbar para la tabla */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 font-sans transition-colors duration-300 h-screen flex flex-col overflow-hidden">

    <script>
        // ==========================================
        // 1. CONFIGURACIÓN Y ESTADO
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbxLJYQe6QZCiDARD1I5ngkqS3hjfzT1oYki9rlClbNpFf-fjLwXv_Lhp_TOcjLgOTZt/exec"; // <-- TU URL AQUÍ
        let adminSession = null;
        let usersData = [];

        // ==========================================
        // 2. HANDSHAKE CON GENAPPS (Recepción de sesión)
        // ==========================================
        window.addEventListener("message", (event) => {
            if (event.data && event.data.type === 'SESSION_SYNC') {
                adminSession = event.data.user;
                const theme = event.data.theme;
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                
                // Una vez que tenemos la sesión del admin, cargamos la tabla
                fetchUsers();
            } else if (event.data && event.data.type === 'THEME_UPDATE') {
                if (event.data.theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }
        });

        // Avisamos al Hub que ya estamos listos para recibir la sesión
        window.onload = () => {
            window.parent.postMessage({ type: 'MODULO_LISTO' }, '*');
        };

        // ==========================================
        // 3. LÓGICA DE DATOS
        // ==========================================
        async function fetchUsers() {
            showLoader(true);
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getUsersList', adminUser: adminSession.usuario })
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    usersData = data.users;
                    renderTable(usersData);
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                alert("Error de conexión al cargar usuarios.");
            } finally {
                showLoader(false);
            }
        }

        async function saveUserAccess(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Guardando...';
            btn.disabled = true;

            const targetUser = document.getElementById('editUsuario').value;
            const newRole = document.getElementById('editRol').value;
            const newModules = document.getElementById('editModulos').value;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateUserAccess',
                        adminUser: adminSession.usuario,
                        targetUser: targetUser,
                        newRole: newRole,
                        newModules: newModules
                    })
                });
                const data = await response.json();

                if (data.status === 'success') {
                    closeModal();
                    fetchUsers(); // Recargamos la tabla
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                alert("Error al guardar.");
            } finally {
                btn.innerHTML = 'Guardar Cambios';
                btn.disabled = false;
            }
        }

        // ==========================================
        // 4. LÓGICA DE UI (Renderizado)
        // ==========================================
        function renderTable(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            users.forEach(u => {
                const isAdmin = u.rol.toUpperCase() === 'ADMINISTRADOR';
                const roleBadge = isAdmin 
                    ? `<span class="px-2.5 py-1 bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 rounded-lg text-xs font-bold tracking-wide uppercase">Admin</span>`
                    : `<span class="px-2.5 py-1 bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-300 rounded-lg text-xs font-bold tracking-wide uppercase">${u.rol}</span>`;
                
                const modulosHTML = isAdmin 
                    ? `<span class="text-xs text-gray-400 italic">Acceso Total</span>`
                    : `<div class="flex flex-wrap gap-1 max-w-[200px]">${u.modulos.split(',').filter(m=>m.trim()).map(m => `<span class="px-2 py-0.5 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 text-[10px] font-bold rounded-md border border-blue-100 dark:border-blue-800/50">${m.trim()}</span>`).join('')}</div>`;

                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors";
                tr.innerHTML = `
                    <td class="py-4 px-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-brand-500 to-brand-700 text-white flex items-center justify-center font-black text-lg flex-shrink-0">
                                ${u.nombre ? u.nombre.charAt(0).toUpperCase() : '?'}
                            </div>
                            <div class="flex flex-col min-w-0">
                                <span class="font-bold text-sm text-gray-800 dark:text-white truncate">${u.nombre || 'Sin Perfil'}</span>
                                <span class="text-xs text-gray-500 dark:text-gray-400 truncate">${u.email || u.usuario}</span>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4 whitespace-nowrap">${roleBadge}</td>
                    <td class="py-4 px-4 whitespace-nowrap text-sm font-medium text-gray-600 dark:text-gray-300">${u.jefatura || u.area || '-'}</td>
                    <td class="py-4 px-4 hidden md:table-cell">${modulosHTML}</td>
                    <td class="py-4 px-4 text-right whitespace-nowrap">
                        <button onclick='openModal(${JSON.stringify(u)})' class="p-2 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:text-brand-600 dark:hover:text-brand-400 rounded-lg transition-colors">
                            <i class="ph-fill ph-pencil-simple text-lg"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openModal(user) {
            document.getElementById('editUsuario').value = user.usuario;
            document.getElementById('displayNombre').textContent = user.nombre;
            document.getElementById('editRol').value = user.rol;
            document.getElementById('editModulos').value = user.modulos;
            
            const modal = document.getElementById('editModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modal.children[0].classList.remove('scale-95');
            });
        }

        function closeModal() {
            const modal = document.getElementById('editModal');
            modal.classList.add('opacity-0');
            modal.children[0].classList.add('scale-95');
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = usersData.filter(u => 
                (u.nombre || '').toLowerCase().includes(query) || 
                (u.email || '').toLowerCase().includes(query) ||
                (u.usuario || '').toLowerCase().includes(query)
            );
            renderTable(filtered);
        }
    </script>

    <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-6 py-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4 z-10 shrink-0">
        <div>
            <h1 class="text-2xl font-black text-gray-800 dark:text-white tracking-tight flex items-center gap-2">
                <i class="ph-fill ph-users text-brand-600"></i> Gestión de Usuarios
            </h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 font-medium mt-1">Control de accesos y roles de la plataforma.</p>
        </div>
        <div class="relative w-full sm:w-72">
            <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Buscar por nombre o correo..." class="w-full pl-10 pr-4 py-2 bg-gray-100 dark:bg-gray-800 border-transparent focus:border-brand-500 focus:bg-white dark:focus:bg-gray-900 rounded-xl text-sm outline-none transition-all">
        </div>
    </header>

    <main class="flex-1 overflow-auto p-4 sm:p-6 relative">
        <div id="loader" class="absolute inset-0 bg-gray-50/80 dark:bg-gray-900/80 backdrop-blur-sm flex-col items-center justify-center z-20 flex">
            <i class="ph ph-spinner-gap animate-spin text-4xl text-brand-600 mb-2"></i>
            <span class="font-bold text-gray-500">Cargando base de datos...</span>
        </div>

        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 dark:bg-gray-800/50 text-gray-500 dark:text-gray-400 text-[11px] uppercase tracking-wider">
                            <th class="py-3 px-4 font-bold">Usuario</th>
                            <th class="py-3 px-4 font-bold">Rol</th>
                            <th class="py-3 px-4 font-bold">Área / Jefatura</th>
                            <th class="py-3 px-4 font-bold hidden md:table-cell">Módulos Permitidos (IDs)</th>
                            <th class="py-3 px-4 font-bold text-right">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="editModal" class="fixed inset-0 bg-gray-900/40 dark:bg-black/60 z-[100] hidden items-center justify-center backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="bg-white dark:bg-gray-900 rounded-[2rem] shadow-2xl w-full max-w-md p-8 transform scale-95 transition-all duration-300 border border-gray-200 dark:border-gray-700 m-4">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-gray-800 dark:text-white flex items-center gap-2">
                    <i class="ph-fill ph-shield-check text-brand-600"></i> Editar Accesos
                </h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors"><i class="ph ph-x text-xl"></i></button>
            </div>
            
            <form onsubmit="saveUserAccess(event)" class="space-y-5">
                <input type="hidden" id="editUsuario">
                
                <div class="p-3 bg-brand-50 dark:bg-brand-900/20 rounded-xl border border-brand-100 dark:border-brand-800/30">
                    <p class="text-xs text-brand-600 dark:text-brand-400 font-bold uppercase tracking-wider mb-1">Modificando a:</p>
                    <p id="displayNombre" class="font-black text-gray-800 dark:text-white truncate"></p>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Nivel de Rol</label>
                    <select id="editRol" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none font-medium">
                        <option value="Administrador">Administrador (Acceso Total)</option>
                        <option value="Gerente">Gerente</option>
                        <option value="Jefe">Jefe</option>
                        <option value="Supervisor">Supervisor</option>
                        <option value="Operario">Operario</option>
                        <option value="Asistente">Asistente</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Módulos Permitidos (IDs separados por coma)</label>
                    <textarea id="editModulos" rows="3" placeholder="Ej: POE, CAT, ESE" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-brand-500 focus:outline-none font-mono text-sm leading-relaxed resize-none"></textarea>
                    <p class="text-xs text-gray-500 mt-2"><i class="ph-fill ph-info"></i> Usa los IDs oficiales de la pestaña Inicio (Ej: POE, CAT). Si es Administrador, ignora este campo.</p>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors">Cancelar</button>
                    <button type="submit" id="btnSave" class="flex-1 py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-700 hover:to-brand-600 transition-all shadow-lg shadow-brand-500/30">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
