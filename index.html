<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios | GenApps</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#fef2f2', 100: '#fee2e2', 500: '#ef4444', 600: '#dc2626', 700: '#e01f36', 800: '#991b1b', 900: '#7f1d1d' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Custom Scrollbar para la tabla */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 font-sans transition-colors duration-300 h-screen flex flex-col overflow-hidden">

    <script>
        // ==========================================
        // 1. CONFIGURACIÓN Y ESTADO
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbxLJYQe6QZCiDARD1I5ngkqS3hjfzT1oYki9rlClbNpFf-fjLwXv_Lhp_TOcjLgOTZt/exec"; 
        let adminSession = null;
        let usersData = [];
        let fullCatalog = []; // Aquí guardaremos las apps

        // ==========================================
        // 2. HANDSHAKE CON GENAPPS
        // ==========================================
        window.addEventListener("message", (event) => {
            if (event.data && event.data.type === 'SESSION_SYNC') {
                adminSession = event.data.user;
                fullCatalog = event.data.catalog || []; // Recibimos el catálogo
                
                if (event.data.theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                
                renderModulesChecklist(); // Dibujamos los checkboxes
                fetchAdminData(); // Cargamos la tabla
            } else if (event.data && event.data.type === 'THEME_UPDATE') {
                if (event.data.theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }
        });

        window.onload = () => {
            window.parent.postMessage({ type: 'MODULO_LISTO' }, '*');
        };

        // ==========================================
        // 3. LÓGICA DE DATOS Y UI
        // ==========================================
        let dbAreas = []; // Memoria para las áreas
        let modulesData = []; // Memoria para los módulos completos

        async function fetchAdminData() {
            showLoader(true);
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getAdminData', adminUser: adminSession.usuario })
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    usersData = data.users;
                    dbAreas = data.areas;
                    modulesData = data.modules;
                    
                    poblarSelectAreas(); // Llenamos el dropdown de áreas
                    applyFilterAndSort(); // Renderizamos la tabla
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                alert("Error de conexión al cargar datos.");
            } finally {
                showLoader(false);
            }
        }

        function renderModulesChecklist() {
            const container = document.getElementById('modulesChecklistContainer');
            container.innerHTML = '';
            
            fullCatalog.forEach(app => {
                const div = document.createElement('div');
                div.className = 'flex items-start gap-3 p-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-750 transition-colors shadow-sm';
                // El ID se pasa a mayúsculas para ser consistente con la BD
                div.innerHTML = `
                    <div class="flex items-center h-5 mt-0.5">
                        <input type="checkbox" id="chk_${app.id}" value="${app.id.toUpperCase()}" class="w-4 h-4 text-brand-600 bg-gray-100 border-gray-300 rounded focus:ring-brand-500 dark:focus:ring-brand-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600 cursor-pointer module-checkbox">
                    </div>
                    <label for="chk_${app.id}" class="flex flex-col cursor-pointer select-none w-full">
                        <span class="text-sm font-bold text-gray-800 dark:text-gray-200 leading-tight">${app.titulo}</span>
                        <span class="text-[10px] font-bold text-gray-400 dark:text-gray-500 tracking-widest uppercase">ID: ${app.id}</span>
                    </label>
                `;
                container.appendChild(div);
            });
        }

    function openModal(userEmail) {
            const user = usersData.find(u => u.email === userEmail);
            if (!user) return;

            document.getElementById('originalEmail').value = user.email; // Guardamos el correo original como ID
            document.getElementById('displayNombre').textContent = user.nombre;
            
            document.getElementById('editEmail').value = user.email;
            document.getElementById('editNombre').value = user.nombre;
            document.getElementById('editUsuario').value = user.usuario;
            document.getElementById('editPassword').value = user.password || '';
            document.getElementById('editTelefono').value = user.telefono || '';
            document.getElementById('editCargo').value = user.cargo || '';
            document.getElementById('editArea').value = user.area || '';
            document.getElementById('editJefatura').value = user.jefatura || '';
            document.getElementById('editRol').value = user.rol || 'Operario';
            document.getElementById('editActivo').value = user.activo === 'NO' ? 'NO' : 'SI';
            
            // Lógica de Checkboxes
            const userModules = (user.modulos || '').split(',').map(m => m.trim().toUpperCase());
            const isAdmin = (user.rol || '').toUpperCase() === 'ADMINISTRADOR';
            
            document.querySelectorAll('.module-checkbox').forEach(cb => {
                cb.checked = isAdmin || userModules.includes(cb.value);
                cb.disabled = isAdmin;
            });

            const modal = document.getElementById('editModal');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            requestAnimationFrame(() => { modal.classList.remove('opacity-0'); modal.children[0].classList.remove('scale-95'); });
        }

        async function saveUserFull(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSaveFull');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Guardando...';
            btn.disabled = true;

            const targetEmail = document.getElementById('originalEmail').value;
            const newRole = document.getElementById('editRol').value;
            
            let newModules = "";
            if (newRole.toUpperCase() !== 'ADMINISTRADOR') {
                const checkedBoxes = Array.from(document.querySelectorAll('.module-checkbox:checked'));
                newModules = checkedBoxes.map(cb => cb.value).join(', ');
            }

            const newData = {
                email: document.getElementById('editEmail').value,
                nombre: document.getElementById('editNombre').value,
                usuario: document.getElementById('editUsuario').value,
                password: document.getElementById('editPassword').value,
                telefono: document.getElementById('editTelefono').value,
                cargo: document.getElementById('editCargo').value,
                area: document.getElementById('editArea').value,
                jefatura: document.getElementById('editJefatura').value,
                rol: newRole,
                activo: document.getElementById('editActivo').value,
                modulos: newModules
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'editUserFull', adminUser: adminSession.usuario, targetEmail, newData })
                });
                const data = await response.json();

                if (data.status === 'success') {
                    closeModal();
                    fetchAdminData(); // Recargamos todo
                } else { alert("Error: " + data.message); }
            } catch (err) { alert("Error al guardar."); } 
            finally { btn.innerHTML = 'Guardar Todo'; btn.disabled = false; }
        }

        // Función dinámica cuando cambias el select del ROL
        function toggleCheckboxesByRole(roleValue) {
            const isAdmin = roleValue.toUpperCase() === 'ADMINISTRADOR';
            document.querySelectorAll('.module-checkbox').forEach(cb => {
                if (isAdmin) {
                    cb.checked = true;
                    cb.disabled = true;
                } else {
                    cb.disabled = false;
                }
            });
        }

        

        // === LÓGICA DE CREACIÓN (USUARIOS Y MÓDULOS) ===

        function openCreateUserModal() {
            document.getElementById('c_user').value = '';
            document.getElementById('c_pass').value = '';
            document.getElementById('c_nombre').value = '';
            document.getElementById('c_email').value = '';
            document.getElementById('c_tel').value = '';
            document.getElementById('c_cargo').value = '';
            document.getElementById('c_area').value = '';
            document.getElementById('c_jefa').value = '';
            
            const m = document.getElementById('createUserModal');
            m.classList.remove('hidden'); m.classList.add('flex');
            requestAnimationFrame(() => { m.classList.remove('opacity-0'); m.children[0].classList.remove('scale-95'); });
        }

        function closeCreateUserModal() {
            const m = document.getElementById('createUserModal');
            m.classList.add('opacity-0'); m.children[0].classList.add('scale-95');
            setTimeout(() => { m.classList.remove('flex'); m.classList.add('hidden'); }, 300);
        }

        async function createNewUser(e) {
            e.preventDefault();
            const btn = document.getElementById('btnCreateUser');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Creando...';
            btn.disabled = true;

            const userData = {
                usuario: document.getElementById('c_user').value,
                password: document.getElementById('c_pass').value,
                nombre: document.getElementById('c_nombre').value,
                email: document.getElementById('c_email').value,
                telefono: document.getElementById('c_tel').value,
                cargo: document.getElementById('c_cargo').value,
                rol: document.getElementById('c_rol').value,
                area: document.getElementById('c_area').value,
                jefatura: document.getElementById('c_jefa').value,
                modulos: "" // Se crea sin módulos inicialmente, luego se le editan
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'addUser', adminUser: adminSession.usuario, userData })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    closeCreateUserModal();
                    fetchUsers(); // Actualiza la tabla automáticamente
                } else { alert("Error: " + data.message); }
            } catch (err) { alert("Error de red."); } finally {
                btn.innerHTML = 'Crear Usuario'; btn.disabled = false;
            }
        }

        function openCreateModuleModal() {
            document.getElementById('m_id').value = '';
            document.getElementById('m_titulo').value = '';
            document.getElementById('m_info').value = '';
            document.getElementById('m_link').value = '';
            document.getElementById('m_img').value = '';
            
            const m = document.getElementById('createModuleModal');
            m.classList.remove('hidden'); m.classList.add('flex');
            requestAnimationFrame(() => { m.classList.remove('opacity-0'); m.children[0].classList.remove('scale-95'); });
        }

        function closeCreateModuleModal() {
            const m = document.getElementById('createModuleModal');
            m.classList.add('opacity-0'); m.children[0].classList.add('scale-95');
            setTimeout(() => { m.classList.remove('flex'); m.classList.add('hidden'); }, 300);
        }

        async function createNewModule(e) {
            e.preventDefault();
            const btn = document.getElementById('btnCreateModule');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Creando...';
            btn.disabled = true;

            const moduleData = {
                id: document.getElementById('m_id').value,
                orden: document.getElementById('m_orden').value || 99,
                titulo: document.getElementById('m_titulo').value,
                info: document.getElementById('m_info').value,
                link: document.getElementById('m_link').value,
                imagen: document.getElementById('m_img').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'addModule', adminUser: adminSession.usuario, moduleData })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    closeCreateModuleModal();
                    alert("Módulo creado. Cierra y vuelve a abrir GenApps para que se actualice el catálogo del menú.");
                } else { alert("Error: " + data.message); }
            } catch (err) { alert("Error de red."); } finally {
                btn.innerHTML = 'Crear Módulo'; btn.disabled = false;
            }
        }
       

        // ==========================================
        // 4. LÓGICA DE UI (Renderizado)
        // ==========================================
        function renderTable(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            users.forEach(u => {
                const isAdmin = u.rol.toUpperCase() === 'ADMINISTRADOR';
                const roleBadge = isAdmin 
                    ? `<span class="px-2.5 py-1 bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 rounded-lg text-xs font-bold tracking-wide uppercase">Admin</span>`
                    : `<span class="px-2.5 py-1 bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-300 rounded-lg text-xs font-bold tracking-wide uppercase">${u.rol}</span>`;
                
                const modulosHTML = isAdmin 
                    ? `<span class="text-xs text-gray-400 italic">Acceso Total</span>`
                    : `<div class="flex flex-wrap gap-1 max-w-[200px]">${u.modulos.split(',').filter(m=>m.trim()).map(m => `<span class="px-2 py-0.5 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 text-[10px] font-bold rounded-md border border-blue-100 dark:border-blue-800/50">${m.trim()}</span>`).join('')}</div>`;

                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors";
                tr.innerHTML = `
                    <td class="py-4 px-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-brand-500 to-brand-700 text-white flex items-center justify-center font-black text-lg flex-shrink-0">
                                ${u.nombre ? u.nombre.charAt(0).toUpperCase() : '?'}
                            </div>
                            <div class="flex flex-col min-w-0">
                                <span class="font-bold text-sm text-gray-800 dark:text-white truncate">${u.nombre || 'Sin Perfil'}</span>
                                <span class="text-xs text-gray-500 dark:text-gray-400 truncate">${u.email || u.usuario}</span>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4 whitespace-nowrap">${roleBadge}</td>
                    <td class="py-4 px-4 whitespace-nowrap text-sm font-medium text-gray-600 dark:text-gray-300">${u.jefatura || u.area || '-'}</td>
                    <td class="py-4 px-4 hidden md:table-cell">${modulosHTML}</td>
                   <td class="py-4 px-4 text-right whitespace-nowrap">
                        <button onclick="openModal('${u.usuario}')" class="p-2 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:text-brand-600 dark:hover:text-brand-400 rounded-lg transition-colors">
                            <i class="ph-fill ph-pencil-simple text-lg"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openModal(userId) {
            // 1. Buscamos los datos exactos del usuario en nuestra memoria
            const user = usersData.find(u => u.usuario === userId);
            if (!user) return; // Por seguridad

            // 2. Llenamos los campos del formulario
            document.getElementById('editUsuario').value = user.usuario;
            document.getElementById('displayNombre').textContent = user.nombre;
            document.getElementById('editRol').value = user.rol;
            
            // 3. Lógica de Checkboxes de Módulos
            const userModules = (user.modulos || '').split(',').map(m => m.trim().toUpperCase());
            const isAdmin = user.rol.toUpperCase() === 'ADMINISTRADOR';
            
            document.querySelectorAll('.module-checkbox').forEach(cb => {
                cb.checked = isAdmin || userModules.includes(cb.value);
                cb.disabled = isAdmin; // Si es admin, no se pueden desmarcar
            });

            // 4. Mostramos el Modal con la animación
            const modal = document.getElementById('editModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modal.children[0].classList.remove('scale-95');
            });
        }

        function closeModal() {
            const modal = document.getElementById('editModal');
            modal.classList.add('opacity-0');
            modal.children[0].classList.add('scale-95');
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'flex' : 'none';
        }

     // ==========================================
        // LÓGICA DE BÚSQUEDA Y ORDENAMIENTO
        // ==========================================
        let currentSort = { column: null, direction: 'asc' };

        function filterTable() {
            applyFilterAndSort();
        }

        function applyFilterAndSort() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            let dataToRender = usersData;

            // 1. Filtrado Profundo (Múltiples columnas)
            if (query) {
                dataToRender = usersData.filter(u => 
                    (u.nombre || '').toLowerCase().includes(query) || 
                    (u.email || '').toLowerCase().includes(query) ||
                    (u.usuario || '').toLowerCase().includes(query) ||
                    (u.rol || '').toLowerCase().includes(query) ||
                    (u.cargo || '').toLowerCase().includes(query) ||
                    (u.area || '').toLowerCase().includes(query) ||
                    (u.jefatura || '').toLowerCase().includes(query) ||
                    (u.modulos || '').toLowerCase().includes(query)
                );
            }

            // 2. Ordenamiento
            if (currentSort.column) {
                dataToRender.sort((a, b) => {
                    let valA = (a[currentSort.column] || '').toString().toLowerCase();
                    let valB = (b[currentSort.column] || '').toString().toLowerCase();
                    
                    // Ajuste para columnas combinadas en la vista
                    if (currentSort.column === 'usuario') {
                        valA = (a.nombre || a.usuario || '').toString().toLowerCase();
                        valB = (b.nombre || b.usuario || '').toString().toLowerCase();
                    } else if (currentSort.column === 'area') {
                        valA = (a.jefatura || a.area || '').toString().toLowerCase();
                        valB = (b.jefatura || b.area || '').toString().toLowerCase();
                    }

                    if (valA < valB) return currentSort.direction === 'asc' ? -1 : 1;
                    if (valA > valB) return currentSort.direction === 'asc' ? 1 : -1;
                    return 0;
                });
            }

            renderTable(dataToRender);
        }

        function sortTable(column) {
            // Cambiar dirección si tocamos la misma columna
            if (currentSort.column === column) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.column = column;
                currentSort.direction = 'asc';
            }

            // Actualizar UI de los íconos (Flechitas)
            document.querySelectorAll('thead i').forEach(icon => {
                icon.classList.add('hidden');
                icon.classList.remove('ph-caret-up', 'ph-caret-down');
            });
            
            const activeIcon = document.getElementById(`sort-icon-${column}`);
            if (activeIcon) {
                activeIcon.classList.remove('hidden');
                activeIcon.classList.add(currentSort.direction === 'asc' ? 'ph-caret-up' : 'ph-caret-down');
            }

            applyFilterAndSort();
        }

        function poblarSelectAreas() {
            const selectArea = document.getElementById('editArea');
            if(!selectArea) return;
            selectArea.innerHTML = '<option value="">Sin Área</option>';
            
            dbAreas.forEach(area => {
                selectArea.innerHTML += `<option value="${area.id}" data-macro="${area.macro}">${area.id} - ${area.nombre}</option>`;
            });
        }

        function onAreaChange() {
            const selectArea = document.getElementById('editArea');
            const selectedOption = selectArea.options[selectArea.selectedIndex];
            const jefaturaInput = document.getElementById('editJefatura');
            
            if (selectedOption && selectedOption.value !== "") {
                jefaturaInput.value = selectedOption.getAttribute('data-macro');
            } else {
                jefaturaInput.value = "";
            }
        }
        
    </script>

    <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-6 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4 z-10 shrink-0">
        <div>
            <h1 class="text-2xl font-black text-gray-800 dark:text-white tracking-tight flex items-center gap-2">
                <i class="ph-fill ph-users text-brand-600"></i> Gestión de Usuarios
            </h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 font-medium mt-1">Control de accesos y roles de la plataforma.</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
            <div class="relative w-full sm:w-64">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Buscar usuario..." class="w-full pl-10 pr-4 py-2 bg-gray-100 dark:bg-gray-800 border-transparent focus:border-brand-500 focus:bg-white dark:focus:bg-gray-900 rounded-xl text-sm outline-none transition-all">
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="openCreateModuleModal()" class="flex-1 sm:flex-none px-4 py-2 bg-gray-800 dark:bg-white dark:text-gray-900 text-white rounded-xl text-sm font-bold flex items-center justify-center gap-2 hover:opacity-90 transition-all shadow-sm">
                    <i class="ph ph-plus-circle text-lg"></i> Módulo
                </button>
                <button onclick="openCreateUserModal()" class="flex-1 sm:flex-none px-4 py-2 bg-brand-600 text-white rounded-xl text-sm font-bold flex items-center justify-center gap-2 hover:bg-brand-700 shadow-lg shadow-brand-600/20 transition-all">
                    <i class="ph ph-user-plus text-lg"></i> Usuario
                </button>
            </div>
        </div>
    </header>

   <main class="flex-1 p-4 sm:p-6 relative flex flex-col h-full overflow-hidden">
        <div id="loader" class="absolute inset-0 bg-gray-50/80 dark:bg-gray-900/80 backdrop-blur-sm flex-col items-center justify-center z-20 flex">
            <i class="ph ph-spinner-gap animate-spin text-4xl text-brand-600 mb-2"></i>
            <span class="font-bold text-gray-500">Cargando base de datos...</span>
        </div>

        <div class="bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl shadow-sm flex flex-col h-full overflow-hidden">
            <div class="overflow-auto flex-1 relative">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 z-10 bg-gray-50 dark:bg-gray-800 shadow-[0_1px_2px_rgba(0,0,0,0.05)] dark:shadow-[0_1px_2px_rgba(255,255,255,0.05)]">
                        <tr class="text-gray-500 dark:text-gray-400 text-[11px] uppercase tracking-wider">
                            <th class="py-3 px-4 font-bold cursor-pointer hover:text-brand-600 dark:hover:text-brand-400 transition-colors select-none" onclick="sortTable('usuario')">
                                <div class="flex items-center gap-2">Usuario <i id="sort-icon-usuario" class="ph ph-caret-up hidden text-sm"></i></div>
                            </th>
                            <th class="py-3 px-4 font-bold cursor-pointer hover:text-brand-600 dark:hover:text-brand-400 transition-colors select-none" onclick="sortTable('rol')">
                                <div class="flex items-center gap-2">Rol <i id="sort-icon-rol" class="ph ph-caret-up hidden text-sm"></i></div>
                            </th>
                            <th class="py-3 px-4 font-bold cursor-pointer hover:text-brand-600 dark:hover:text-brand-400 transition-colors select-none" onclick="sortTable('area')">
                                <div class="flex items-center gap-2">Área / Jefatura <i id="sort-icon-area" class="ph ph-caret-up hidden text-sm"></i></div>
                            </th>
                            <th class="py-3 px-4 font-bold hidden md:table-cell">Módulos Permitidos (IDs)</th>
                            <th class="py-3 px-4 font-bold text-right">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="editModal" class="fixed inset-0 bg-gray-900/40 dark:bg-black/60 z-[100] hidden items-center justify-center backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="bg-white dark:bg-gray-900 rounded-[2rem] shadow-2xl w-full max-w-md p-8 transform scale-95 transition-all duration-300 border border-gray-200 dark:border-gray-700 m-4">

                <h3 class="text-xl font-black text-gray-800 dark:text-white flex items-center gap-2">
                    <i class="ph-fill ph-shield-check text-brand-600"></i> Editar Accesos
                </h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors"><i class="ph ph-x text-xl"></i></button>
            </div>

            <form onsubmit="saveUserFull(event)" class="space-y-4 max-h-[75vh] overflow-y-auto px-1">
                <input type="hidden" id="originalEmail">
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="sm:col-span-2 p-3 bg-brand-50 dark:bg-brand-900/20 rounded-xl border border-brand-100 dark:border-brand-800/30 flex justify-between items-center">
                        <div>
                            <p class="text-xs text-brand-600 dark:text-brand-400 font-bold uppercase tracking-wider mb-1">Modificando a:</p>
                            <p id="displayNombre" class="font-black text-gray-800 dark:text-white truncate"></p>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-700 dark:text-gray-300 mr-2">Estado:</label>
                            <select id="editActivo" class="px-2 py-1 bg-white dark:bg-gray-800 border rounded font-bold text-sm">
                                <option value="SI">ACTIVO</option>
                                <option value="NO">INACTIVO</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Correo Electrónico (ID) *</label>
                        <input type="email" id="editEmail" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Nombre Completo *</label>
                        <input type="text" id="editNombre" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm outline-none" required>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Usuario (Login) *</label>
                        <input type="text" id="editUsuario" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Nueva Contraseña (Opcional)</label>
                        <input type="text" id="editPassword" placeholder="Dejar en blanco para no cambiar" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Teléfono</label>
                        <input type="text" id="editTelefono" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Cargo</label>
                        <input type="text" id="editCargo" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Área (DB_AREAS)</label>
                        <select id="editArea" onchange="onAreaChange()" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm outline-none">
                            </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Jefatura (Macro Área)</label>
                        <input type="text" id="editJefatura" readonly class="w-full px-3 py-2 bg-gray-200 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-xl text-sm outline-none cursor-not-allowed text-gray-500">
                    </div>

                    <div class="sm:col-span-2 border-t border-gray-200 dark:border-gray-700 pt-4 mt-2">
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Nivel de Rol</label>
                        <select id="editRol" onchange="toggleCheckboxesByRole(this.value)" class="w-full px-4 py-2 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl font-medium outline-none">
                            <option value="Administrador">Administrador (Acceso Total)</option>
                            <option value="Gerente">Gerente</option>
                            <option value="Jefe">Jefe</option>
                            <option value="Supervisor">Supervisor</option>
                            <option value="Operario">Operario</option>
                            <option value="Asistente">Asistente</option>
                        </select>
                    </div>

                    <div class="sm:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Módulos Permitidos</label>
                        <div id="modulesChecklistContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-40 overflow-y-auto pr-1 bg-gray-50 dark:bg-gray-800 p-2 rounded-xl border border-gray-200 dark:border-gray-700">
                            </div>
                    </div>
                </div>

                <div class="flex gap-3 pt-4 sticky bottom-0 bg-white dark:bg-gray-900 pb-2">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3.5 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-300 transition-colors">Cancelar</button>
                    <button type="submit" id="btnSaveFull" class="flex-1 py-3.5 rounded-xl font-bold text-white bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-700 hover:to-brand-600 transition-all shadow-lg">Guardar Todo</button>
                </div>
            </form>
            
        </div>
    </div>
<div id="createUserModal" class="fixed inset-0 bg-gray-900/40 dark:bg-black/60 z-[100] hidden items-center justify-center backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="bg-white dark:bg-gray-900 rounded-[2rem] shadow-2xl w-full max-w-lg p-8 transform scale-95 transition-all duration-300 border border-gray-200 dark:border-gray-700 m-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-gray-800 dark:text-white flex items-center gap-2">
                    <i class="ph-fill ph-user-plus text-brand-600"></i> Nuevo Usuario
                </h3>
                <button onclick="closeCreateUserModal()" class="text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors"><i class="ph ph-x text-xl"></i></button>
            </div>
            <form onsubmit="createNewUser(event)" class="space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">ID Usuario *</label>
                        <input type="text" id="c_user" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Contraseña *</label>
                        <input type="text" id="c_pass" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none" required>
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Nombre Completo *</label>
                        <input type="text" id="c_nombre" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Email</label>
                        <input type="email" id="c_email" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Teléfono</label>
                        <input type="text" id="c_tel" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Cargo</label>
                        <input type="text" id="c_cargo" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Rol *</label>
                        <select id="c_rol" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                            <option value="Operario">Operario</option>
                            <option value="Asistente">Asistente</option>
                            <option value="Supervisor">Supervisor</option>
                            <option value="Jefe">Jefe</option>
                            <option value="Gerente">Gerente</option>
                            <option value="Administrador">Administrador</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Área (ID)</label>
                        <input type="text" id="c_area" placeholder="Ej: AREA-01" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Jefatura</label>
                        <input type="text" id="c_jefa" placeholder="Ej: PRODUCCION" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeCreateUserModal()" class="flex-1 py-3 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-300 transition-colors">Cancelar</button>
                    <button type="submit" id="btnCreateUser" class="flex-1 py-3 rounded-xl font-bold text-white bg-brand-600 hover:bg-brand-700 transition-all shadow-lg">Crear Usuario</button>
                </div>
            </form>
        </div>
    </div>

    <div id="createModuleModal" class="fixed inset-0 bg-gray-900/40 dark:bg-black/60 z-[100] hidden items-center justify-center backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <div class="bg-white dark:bg-gray-900 rounded-[2rem] shadow-2xl w-full max-w-md p-8 transform scale-95 transition-all duration-300 border border-gray-200 dark:border-gray-700 m-4">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black text-gray-800 dark:text-white flex items-center gap-2">
                    <i class="ph-fill ph-app-window text-gray-800 dark:text-white"></i> Nuevo Módulo
                </h3>
                <button onclick="closeCreateModuleModal()" class="text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors"><i class="ph ph-x text-xl"></i></button>
            </div>
            <form onsubmit="createNewModule(event)" class="space-y-4">
                <div class="flex gap-4">
                    <div class="w-1/3">
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">ID Corto *</label>
                        <input type="text" id="m_id" placeholder="Ej: APP" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none uppercase" required>
                    </div>
                    <div class="w-2/3">
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Título Público *</label>
                        <input type="text" id="m_titulo" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Descripción / Info</label>
                    <input type="text" id="m_info" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Enlace URL *</label>
                    <input type="url" id="m_link" placeholder="https://..." class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none" required>
                </div>
                <div class="flex gap-4">
                    <div class="w-1/3">
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Orden (Nº)</label>
                        <input type="number" id="m_orden" value="99" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                    </div>
                    <div class="w-2/3">
                        <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1">Imagen (URL)</label>
                        <input type="url" id="m_img" placeholder="https://..." class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-sm focus:ring-2 focus:ring-brand-500 outline-none">
                    </div>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeCreateModuleModal()" class="flex-1 py-3 rounded-xl font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:text-gray-300 transition-colors">Cancelar</button>
                    <button type="submit" id="btnCreateModule" class="flex-1 py-3 rounded-xl font-bold text-white bg-gray-800 dark:bg-white dark:text-gray-900 transition-all shadow-lg">Crear Módulo</button>
                </div>
            </form>
        </div>
